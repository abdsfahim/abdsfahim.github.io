<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title id="pg-title">Abdullah Shadek Fahim | Researcher & Professional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        /* CSS variables and global styles remain similar but optimized for larger content */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f8f7f3;--surface:#fff;--surface2:#f2efe9;
            --border:#e6e1d9;--border2:#d5cfc6;
            --ink:#1a1714;--ink2:#4a453e;--ink3:#8a837a;
            --blue:#1d5aff;--blue-l:#e8eeff;--blue-m:#c5d3ff;
            --teal:#00897b;--teal-l:#e0f4f1;
            --amber:#b87000;--amber-l:#fef3e0;
            --rose:#c0335a;--rose-l:#fde8ef;
            --green:#2e7d32;--green-l:#e8f5e9;
            --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
            --shadow-lg:0 4px 6px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.12);
            --r:14px;--r-sm:8px;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
        
        /* Navigation */
        nav{position:sticky;top:0;z-index:80;background:rgba(248,247,243,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:56px}
        .nav-logo{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:var(--ink);cursor:pointer}
        .nav-logo span{color:var(--blue)}
        .nav-links{display:flex;gap:1.5rem;list-style:none}
        .nav-links a{color:var(--ink3);text-decoration:none;font-size:.83rem;font-weight:500;transition:color .2s}
        .nav-links a:hover{color:var(--blue)}
        .nav-edit{font-size:.75rem;font-weight:600;padding:.28rem .7rem;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--ink3);cursor:pointer;transition:all .2s}
        .nav-edit:hover{border-color:var(--blue);color:var(--blue)}

        /* Hero Section - Redesigned as per request */
        .hero{max-width:1100px;margin:0 auto;padding:4rem 5vw 3rem;display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:center}
        .hero-photo{width:180px;height:180px;border-radius:24px;object-fit:cover;border:4px solid var(--surface);box-shadow:var(--shadow-lg);transform: rotate(-2deg)}
        .hero-name{font-family:'Fraunces',serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:.7rem}
        .hero-name em{font-style:italic;color:var(--blue)}
        .hero-bio{font-size:1rem;color:var(--ink2);max-width:600px;line-height:1.75;margin-bottom:1.5rem}
        
        /* Grid and Cards */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;position:relative}
        .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--blue-m)}
        
        /* Detail Pages */
        .detail-page{max-width:900px;margin:0 auto;padding:2rem 5vw 4rem}
        .detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
        .detail-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.8rem;margin-bottom:1.2rem}
        .detail-title{font-family:'Fraunces',serif;font-size:2.2rem;margin-bottom:0.5rem}

        /* Review Styles */
        .review-card{background:var(--surface2);padding:1.2rem;border-radius:12px;margin-bottom:1rem;border-left:4px solid var(--amber)}
        .review-stars{color:#f59e0b;margin-bottom:0.4rem}

        /* Utils */
        .tag{padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:600;margin-right:4px;display:inline-block;background:var(--blue-l);color:var(--blue)}
        .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:var(--r-sm);font-size:.85rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .2s}
        .btn-p{background:var(--blue);color:#fff}
        .btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border2)}
        
        /* Admin Panel */
        #adm-ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,23,20,.6);backdrop-filter:blur(5px);justify-content:flex-end}
        #adm-ov.open{display:flex}
        .adm-panel{background:var(--surface);width:100%;max-width:500px;height:100vh;overflow-y:auto;padding:1.5rem;box-shadow:var(--shadow-lg)}

        footer{text-align:center;padding:3rem;color:var(--ink3);border-top:1px solid var(--border)}
        
        @media(max-width:680px){.hero{grid-template-columns:1fr;text-align:center}.hero-photo{margin:0 auto}}
    </style>
</head>
<body>

<nav>
    <div class="nav-logo" onclick="goHome()">A.S.<span>FAHIM</span></div>
    <ul class="nav-links">
        <li><a href="#research">Research</a></li>
        <li><a href="#publications">Papers</a></li>
        <li><a href="#fiverr">Fiverr</a></li>
        <li><a href="#experience">Experience</a></li>
    </ul>
    <button class="nav-edit" onclick="openAdmin()">⚙ Edit Portfolio</button>
</nav>

<div id="app"></div>

<footer>
    © 2026 Abdullah Shadek Fahim | Jashore University of Science and Technology
</footer>

<div id="adm-ov">
    <div class="adm-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
            <h2>Admin Panel</h2>
            <button onclick="closeAdmin()" style="cursor:pointer;background:none;border:none;font-size:1.5rem">✕</button>
        </div>
        <div id="adm-content"></div>
    </div>
</div>

<script>
/* DATA MANAGEMENT
   We store data in LocalStorage. If empty, we load your initial profile.
*/
const INITIAL_DATA = {
    hero: {
        name: "Abdullah Shadek Fahim",
        tagline: "Electrical & Electronic Engineer | Level 2 Fiverr Seller",
        bio: "Specializing in Semiconductor Research (Ion Implantation) and Full-stack Web Development. Recently completed Undergraduate studies at JUST with a passion for Machine Learning in Physics.",
        photo: "https://via.placeholder.com/180", // Replace with your actual photo URL
        email: "asfahimbd@gmail.com",
        github: "https://github.com/abdullahFahim19",
        linkedin: "https://linkedin.com/in/abdullah-fahim7640"
    },
    fiverr_projects: [],
    research: [],
    publications: [],
    experience: [],
    sessions: [],
    certificates: []
};

let DB = JSON.parse(localStorage.getItem('asf_portfolio_v2')) || INITIAL_DATA;

function saveToDB() {
    localStorage.setItem('asf_portfolio_v2', JSON.stringify(DB));
    renderHome();
}

/* ROUTING ENGINE 
   Handles "Home" vs "Learn More" pages without reloading.
*/
function route() {
    const hash = window.location.hash.replace('#', '');
    if (!hash || ['research','publications','fiverr','experience'].includes(hash)) {
        renderHome();
    } else if (hash.startsWith('view-')) {
        const [_, type, id] = hash.split('-');
        renderDetailPage(type, id);
    }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', route);

/* RENDERING LOGIC
*/
function renderHome() {
    const h = DB.hero;
    document.getElementById('app').innerHTML = `
        <section class="hero">
            <img src="${h.photo}" class="hero-photo" alt="Profile">
            <div>
                <div style="color:var(--blue);font-weight:700;font-size:.8rem;text-transform:uppercase;margin-bottom:.5rem">Welcome to my Portfolio</div>
                <h1 class="hero-name">${h.name}</h1>
                <p class="hero-bio">${h.bio}</p>
                <div style="display:flex;gap:1rem">
                    <a href="mailto:${h.email}" class="btn btn-p">Contact Me</a>
                    <a href="${h.linkedin}" target="_blank" class="btn btn-g">LinkedIn</a>
                </div>
            </div>
        </section>

        <section class="detail-page" id="fiverr">
            <h2 style="font-family:Fraunces;margin-bottom:1.5rem">Fiverr Projects & Reviews</h2>
            <div class="grid" id="fiverr-grid">
                ${DB.fiverr_projects.map(p => `
                    <div class="card" onclick="location.hash='view-fiverr-${p.id}'">
                        <img src="${p.thumbnail}" style="width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:1rem">
                        <h3 style="font-size:1rem">${p.title}</h3>
                        <div class="review-stars">${'★'.repeat(5)}</div>
                        <p style="font-size:.8rem;color:var(--ink3)">${p.shortDesc}</p>
                        <div style="margin-top:auto;color:var(--blue);font-weight:700;font-size:.8rem">Learn More →</div>
                    </div>
                `).join('') || '<p>No projects added yet. Click ⚙ Edit to add.</p>'}
            </div>
        </section>

        `;
}

function renderDetailPage(type, id) {
    let item;
    if(type === 'fiverr') item = DB.fiverr_projects.find(p => p.id == id);
    // Add logic for other types here
    
    if(!item) { goHome(); return; }

    document.getElementById('app').innerHTML = `
        <div class="detail-page">
            <button onclick="goHome()" class="btn btn-g" style="margin-bottom:2rem">← Back to Home</button>
            <div class="detail-hero">
                <h1 class="detail-title">${item.title}</h1>
                <p>${item.shortDesc}</p>
            </div>
            
            <div class="detail-section">
                <h3>Project Details</h3>
                <p style="margin-top:1rem">${item.fullDetails || 'No detailed description provided.'}</p>
            </div>

            ${item.images ? `
                <div class="detail-section">
                    <h3>Gallery</h3>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem">
                        ${item.images.map(img => `<img src="${img}" style="width:100%;border-radius:8px">`).join('')}
                    </div>
                </div>
            ` : ''}

            ${item.reviews ? `
                <div class="detail-section">
                    <h3>Client Reviews</h3>
                    ${item.reviews.map(r => `
                        <div class="review-card">
                            <div class="review-stars">${'★'.repeat(r.stars)}</div>
                            <p>"${r.text}"</p>
                            <small>— ${r.clientName}</small>
                        </div>
                    `).join('')}
                </div>
            ` : ''}
        </div>
    `;
    window.scrollTo(0,0);
}

function goHome() { window.location.hash = ''; }

/* ADMIN FUNCTIONS
   Simple UI to add data.
*/
function openAdmin() {
    document.getElementById('adm-ov').style.display = 'flex';
    renderAdminUI();
}

function closeAdmin() {
    document.getElementById('adm-ov').style.display = 'none';
}

function renderAdminUI() {
    document.getElementById('adm-content').innerHTML = `
        <div style="margin-bottom:2rem">
            <h4>Add New Fiverr Project</h4>
            <input type="text" id="p-title" placeholder="Project Title" style="width:100%;margin:5px 0;padding:8px">
            <input type="text" id="p-thumb" placeholder="Thumbnail URL (Imgur/Behance)" style="width:100%;margin:5px 0;padding:8px">
            <textarea id="p-desc" placeholder="Short Description" style="width:100%;margin:5px 0;padding:8px"></textarea>
            <button onclick="addProject()" class="btn btn-p" style="width:100%">Save Project</button>
        </div>
        <hr>
        <div style="margin-top:1rem">
            <h4>Existing Projects</h4>
            ${DB.fiverr_projects.map(p => `
                <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee">
                    <span>${p.title}</span>
                    <button onclick="deleteProject(${p.id})" style="color:red">Delete</button>
                </div>
            `).join('')}
        </div>
    `;
}

function addProject() {
    const title = document.getElementById('p-title').value;
    const thumb = document.getElementById('p-thumb').value;
    const desc = document.getElementById('p-desc').value;

    if(!title) return alert("Title is required");

    const newProject = {
        id: Date.now(),
        title: title,
        thumbnail: thumb || 'https://via.placeholder.com/300',
        shortDesc: desc,
        fullDetails: "", // You can add a field for this in the UI
        reviews: [],
        images: []
    };

    DB.fiverr_projects.push(newProject);
    saveToDB();
    renderAdminUI();
}

function deleteProject(id) {
    DB.fiverr_projects = DB.fiverr_projects.filter(p => p.id !== id);
    saveToDB();
    renderAdminUI();
}

</script>
</body>
</html>
